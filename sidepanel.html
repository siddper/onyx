<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Markdown Side Panel</title>
    <link rel="stylesheet" href="sidepanel.css" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap');
    </style>
    <style id="customFonts"></style>
  </head>
  <body>
    <div class="app">
      <section class="toolbar" aria-label="Obsidian Settings">
        <div class="toolbar-row toolbar-row--half">
          <label>
            Vault name
            <input id="vaultInput" type="text" placeholder="MyVault" />
          </label>
          <label>
            Folder in vault
            <input id="folderInput" type="text" placeholder="Blank for root" />
          </label>
        </div>
        <div class="toolbar-row">
          <label>
            Note title
            <input id="titleInput" type="text" placeholder="Untitled" />
          </label>
          <span id="status" role="status" aria-live="polite"></span>
        </div>
        <div class="toolbar-row">
          <button id="exportBtn" class="primary">Export to Obsidian</button>
        </div>
        <div class="toolbar-row">
          <button id="settingsBtn" class="ghost">Settings</button>
        </div>
      </section>

      <main class="editor-wrap" id="editorWrap">
        <div class="editor-pane">
          <label class="pane-label" for="markdownInput">Source</label>
          <div class="editor-caret-wrap">
            <textarea id="markdownInput" placeholder="# Start writing markdown..." spellcheck="true"></textarea>
            <div id="editorCaretMirror" class="editor-caret-mirror" aria-hidden="true"></div>
            <div id="editorFakeCaret" class="editor-fake-caret" aria-hidden="true"></div>
          </div>
        </div>
        <div id="editorResizer" class="editor-resizer"></div>
        <div class="preview-pane">
          <span class="pane-label">Preview</span>
          <div id="markdownPreview" class="markdown-body" aria-live="polite"></div>
        </div>
      </main>
    </div>

    <script src="markdown.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
