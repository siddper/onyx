<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Markdown Side Panel</title>
    <link rel="stylesheet" href="sidepanel.css" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap');
    </style>
    <style id="customFonts"></style>
  </head>
  <body>
    <div class="app">
      <section class="toolbar" aria-label="Obsidian Settings">
        <div class="toolbar-row toolbar-row--half">
          <label>
            Vault name
            <div class="vault-dropdown" id="vaultDropdown">
              <input type="hidden" id="vaultInput" />
              <button type="button" id="vaultDropdownTrigger" class="vault-dropdown-trigger" aria-haspopup="listbox" aria-expanded="false" aria-label="Choose vault">MyVault</button>
              <div id="vaultDropdownList" class="vault-dropdown-list" role="listbox" aria-label="Saved vaults" hidden></div>
            </div>
          </label>
          <label>
            Folder in vault
            <input id="folderInput" type="text" placeholder="Blank for root" />
          </label>
        </div>
        <div class="toolbar-row">
          <label>
            Note title
            <div class="title-input-wrap">
              <input id="titleInput" type="text" placeholder="Untitled" />
              <button type="button" id="capturePageIconBtn" class="toolbar-title-icon" aria-label="Use current page title and add link" title="Use current page title and add link">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor" aria-hidden="true"><path d="M325-111.5q-73-31.5-127.5-86t-86-127.5Q80-398 80-480.5t31.5-155q31.5-72.5 86-127t127.5-86Q398-880 480.5-880t155 31.5q72.5 31.5 127 86t86 127Q880-563 880-480.5T848.5-325q-31.5 73-86 127.5t-127 86Q563-80 480.5-80T325-111.5ZM480-162q26-36 45-75t31-83H404q12 44 31 83t45 75Zm-104-16q-18-33-31.5-68.5T322-320H204q29 50 72.5 87t99.5 55Zm208 0q56-18 99.5-55t72.5-87H638q-9 38-22.5 73.5T584-178ZM170-400h136q-3-20-4.5-39.5T300-480q0-21 1.5-40.5T306-560H170q-5 20-7.5 39.5T160-480q0 21 2.5 40.5T170-400Zm216 0h188q3-20 4.5-39.5T580-480q0-21-1.5-40.5T574-560H386q-3 20-4.5 39.5T380-480q0 21 1.5 40.5T386-400Zm268 0h136q5-20 7.5-39.5T800-480q0-21-2.5-40.5T790-560H654q3 20 4.5 39.5T660-480q0 21-1.5 40.5T654-400Zm-16-240h118q-29-50-72.5-87T584-782q18 33 31.5 68.5T638-640Zm-234 0h152q-12-44-31-83t-45-75q-26 36-45 75t-31 83Zm-200 0h118q9-38 22.5-73.5T376-782q-56 18-99.5 55T204-640Z"/></svg>
              </button>
            </div>
          </label>
          <span id="status" role="status" aria-live="polite"></span>
        </div>
        <div class="toolbar-row">
          <button id="exportBtn" class="primary">Export to Obsidian</button>
        </div>
        <div class="toolbar-row">
          <button id="settingsBtn" class="ghost">Settings</button>
        </div>
      </section>

      <main class="editor-wrap" id="editorWrap">
        <div class="editor-pane">
          <label class="pane-label" for="markdownInput">Source <span id="sourceCount" class="pane-count" aria-live="polite"></span></label>
          <div class="editor-caret-wrap">
            <textarea id="markdownInput" placeholder="# Start writing markdown..." spellcheck="true"></textarea>
            <div id="editorCaretMirror" class="editor-caret-mirror" aria-hidden="true"></div>
            <div id="editorFakeCaret" class="editor-fake-caret" aria-hidden="true"></div>
          </div>
        </div>
        <div id="editorResizer" class="editor-resizer"></div>
        <div class="preview-pane">
          <span class="pane-label">Preview</span>
          <div id="markdownPreview" class="markdown-body" aria-live="polite"></div>
        </div>
      </main>
    </div>

    <script src="markdown.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
